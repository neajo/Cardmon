<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cardmon Battle</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <h1>⚡ CARDMON BATTLE ⚡</h1>
      <div class="trainer-info">
        <span>👤 <span id="player-name-tag">VITOR</span></span>
        <span>🏆 NÍVEL <span id="player-level">1</span></span>
        <span>🎒 ITENS: <span id="item-count">2</span></span>
      </div>
    </div>

    <div class="arena">
      <!-- Cardmon inimigo -->
      <div class="cardmon-card opponent">
        <div class="pixel-sprite" id="opponent-sprite">
          <span class="pixel-emoji" id="opponent-emoji">❓</span>
        </div>
        <div class="cardmon-name" id="opponent-name">---</div>
        <div class="stats-panel">
          <div class="stat-bar">
            <span class="stat-icon">❤️</span>
            <div class="bar-bg">
              <div class="bar-fill hp-fill" id="opponent-hp-fill" style="width: 0%"></div>
            </div>
            <span class="stat-value"><span id="opponent-hp">0</span>/<span id="opponent-hp-max">0</span></span>
          </div>
          <div class="stat-bar">
            <span class="stat-icon">⚡</span>
            <div class="bar-bg">
              <div class="bar-fill energy-fill" id="opponent-energy-fill" style="width: 0%"></div>
            </div>
            <span class="stat-value"><span id="opponent-energy">0</span>/<span id="opponent-energy-max">0</span></span>
          </div>
        </div>
      </div>

      <div class="vs-pixel">VS</div>

      <!-- Cardmon do jogador -->
      <div class="cardmon-card player">
        <div class="pixel-sprite" id="player-sprite">
          <span class="pixel-emoji" id="player-emoji">❓</span>
        </div>
        <div class="cardmon-name" id="player-name">---</div>
        <div class="stats-panel">
          <div class="stat-bar">
            <span class="stat-icon">❤️</span>
            <div class="bar-bg">
              <div class="bar-fill hp-fill" id="player-hp-fill" style="width: 0%"></div>
            </div>
            <span class="stat-value"><span id="player-hp">0</span>/<span id="player-hp-max">0</span></span>
          </div>
          <div class="stat-bar">
            <span class="stat-icon">⚡</span>
            <div class="bar-bg">
              <div class="bar-fill energy-fill" id="player-energy-fill" style="width: 0%"></div>
            </div>
            <span class="stat-value"><span id="player-energy">0</span>/<span id="player-energy-max">0</span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="action-panel">
      <div class="moves" id="move-buttons"></div>
      <div class="action-buttons">
        <button class="action-btn" id="sleep-btn">💤 DORMIR</button>
        <button class="action-btn" id="switch-btn">🔄 TROCAR</button>
        <button class="action-btn" id="items-btn">🧪 ITENS</button>
        <button class="action-btn" id="flee-btn">🏃 FUGIR</button>
      </div>
      <div id="switch-container" class="popup-panel hidden"></div>
      <div id="items-container" class="popup-panel hidden"></div>
      <div class="log" id="log">
        <div>🔥 BATALHA INICIADA!</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
