<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardmon Adventure</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div id="world-screen">
            <div id="map">
                <div id="player" class="character"></div>
                <div id="npc" class="character npc"></div>
            </div>
            <div class="instructions">USE AS SETAS (↑↓←→) PARA ANDAR ATÉ O NPC</div>
        </div>

        <div id="battle-screen" class="hidden">
            <div class="arena">
                <div class="side enemy">
                    <div class="status-box">
                        <div class="info"><span>CORSOLA</span> <span class="lv">Lv84</span></div>
                        <div class="hp-bar"><div id="e-hp" class="fill"></div></div>
                    </div>
                    <img id="e-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/222.png" alt="enemy">
                </div>

                <div class="side player">
                    <img id="p-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/139.png" alt="player">
                    <div class="status-box">
                        <div class="info"><span>OMASTAR</span> <span class="lv">Lv82</span></div>
                        <div class="hp-bar"><div id="p-hp" class="fill"></div></div>
                        <div class="en-bar"><div id="p-en" class="fill"></div></div>
                    </div>
                </div>
            </div>

            <div class="ui">
                <div id="log">🔥 Uma batalha começou!</div>
                <div id="actions" class="grid">
                    </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
